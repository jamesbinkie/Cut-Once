{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] px-4">
    <h1 class="text-5xl font-extrabold mb-8 text-gray-800">What do you want to learn?</h1>
    
    <form action="/search" method="GET" class="w-full max-w-2xl">
        <div class="relative group">
            <input type="text" name="q" 
                   placeholder="Describe your question..." 
                   class="w-full px-6 py-4 text-lg rounded-full border border-gray-200 shadow-sm focus:shadow-md focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 outline-none transition-all pl-14">
            <div class="absolute left-5 top-4 text-gray-400 group-focus-within:text-indigo-500">
                <i class="fa-solid fa-magnifying-glass text-xl"></i>
            </div>
        </div>
        <div class="mt-8 flex justify-center space-x-4">
            <button type="submit" class="px-6 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md text-sm font-medium transition">
                Search Knowledge
            </button>
        </div>
    </form>
</div>
{% endblock %}
