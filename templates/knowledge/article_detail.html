
{% extends 'base.html' %}

{% block content %}
<article class="mt-8 space-y-8">
    <h1 class="text-4xl font-extrabold text-brand">{{ article.title }}</h1>

    <div id="page-content" class="space-y-6">
        {% for block in article.content_blocks %}
            {% if block.type == "text" %}
                <div class="prose dark:prose-invert max-w-none text-gray-800 dark:text-zinc-200">
                    {{ block.value|safe }}
                </div>
            
            {% elif block.type == "image" %}
                <figure class="my-6">
                    <img src="{{ block.value }}" class="rounded-2xl shadow-xl border border-gray-200 dark:border-zinc-700 w-full">
                    {% if block.caption %}<figcaption class="text-center text-sm text-gray-500 mt-2">{{ block.caption }}</figcaption>{% endif %}
                </figure>

            {% elif block.type == "widget" %}
                <div class="bg-gray-100 dark:bg-zinc-800 p-6 rounded-xl border-l-4 border-brand">
                    {{ block.value|safe }}
                </div>
            {% endif %}
        {% endfor %}
    </div>
</article>
{% endblock %}
