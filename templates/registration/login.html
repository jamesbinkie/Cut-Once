{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Sign In</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {% if form.errors %}
                <p class="text-red-500 text-sm text-center">Your username and password didn't match. Please try again.</p>
            {% endif %}

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" autofocus required
                       class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 rounded-lg border border-gray-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-400 outline-none transition">
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition-all mt-4">
                Enter Knowledge Base
            </button>
        </form>
    </div>
</div>
{% endblock %}
