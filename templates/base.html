<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Base</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <nav class="flex justify-between items-center p-6">
        <div class="text-xl font-bold tracking-tight text-indigo-600">KNOWLEDGE.</div>
        
        <div class="flex items-center space-x-6">
            {% if user.is_authenticated %}
                {% if user.is_staff or user.groups.all.0.name == 'page_admins' %}
                    <a href="/add" class="text-gray-500 hover:text-indigo-600 transition">
                        <i class="fa-solid fa-circle-plus text-2xl"></i>
                    </a>
                {% endif %}
                <span class="text-sm text-gray-400">|</span>
                <a href="{% url 'logout' %}" class="text-sm font-medium hover:underline">Logout</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
