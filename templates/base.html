{% load static %}
<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut-Once</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        // 2. Configure Tailwind with Brand Identity
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                brand: '#009FE3', // Your signature blue
              },
              fontFamily: {
                sans: ['"Open Sans"', 'sans-serif'],
              }
            }
          }
        }

        // Apply theme immediately to prevent flashing
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <style>
        /* 3. Global Typography Rules */
        body { 
            font-family: 'Open Sans', sans-serif; 
            font-weight: 400; /* Regular */
        }
        
        h1 { font-weight: 800 !important; } /* Extra Bold for main titles */
        h2, h3 { font-weight: 700 !important; } /* Bold for subheadings */
        
        /* Semibold for important highlights */
        strong, .font-semibold { font-weight: 600 !important; } 

        /* Fallback Colors */
        .dark body { background-color: #18181b !important; color: #f4f4f5 !important; }
        .dark input { background-color: #27272a !important; color: white !important; border-color: #3f3f46 !important; }
        
        /* Apply brand color to selection/highlights */
        ::selection { background-color: #009FE3; color: white; }

        /* AI Status Pulse Animation */
        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(40, 167, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-zinc-900 text-gray-900 dark:text-gray-100 antialiased transition-colors duration-300">

    <nav class="flex justify-between items-center p-6 bg-white dark:bg-zinc-800 border-b border-gray-200 dark:border-zinc-700">
        <div class="text-xl font-extrabold tracking-tighter text-brand">CUT-ONCE.</div>
        
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" type="button" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg p-2.5">
                <i id="theme-toggle-icon" class="fa-solid fa-moon text-xl"></i>
            </button>

            {% if user.is_authenticated %}
                <span class="text-sm text-gray-400">|</span>
                {% if user.is_staff %}
                    <a href="/admin" class="text-brand hover:opacity-80 transition-opacity">
                        <i class="fa-solid fa-gears text-xl"></i>
                    </a>
                {% endif %}
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-medium hover:underline">Logout</button>
                </form>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6">
        <div class="py-12 text-center">
            <h1 class="text-4xl mb-4">How can I help you today?</h1>
            <p class="text-gray-600 dark:text-gray-400 mb-8 text-lg">Ask a question and I'll search our internal documents for an answer.</p>
            
            <form method="GET" action="/search" class="relative max-w-2xl mx-auto">
                <input type="text" name="q" placeholder="Ask a question..." 
                       class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 focus:ring-2 focus:ring-brand outline-none shadow-lg transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-5 text-gray-400"></i>
            </form>
        </div>

        {% block content %}{% endblock %}
    </main>

    <div id="ai-status-container" class="fixed bottom-4 right-4 z-50 bg-white dark:bg-zinc-800 px-3 py-1.5 rounded-full shadow-md border border-gray-200 dark:border-zinc-700 flex items-center space-x-2 text-xs">
        <span id="ai-status-dot" class="w-2.5 h-2.5 rounded-full bg-gray-400 block"></span>
        <span id="ai-status-text" class="text-gray-500 font-semibold tracking-wide uppercase">Checking AI...</span>
    </div>

    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-toggle-icon');
        
        function updateUI() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }
        
        if (localStorage.getItem('color-theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', 'light');
        }
        updateUI();
        
        themeToggleBtn.addEventListener('click', function() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
            updateUI();
        });

        // AI Status Pulse Script
        document.addEventListener('DOMContentLoaded', function() {
            const statusDot = document.getElementById('ai-status-dot');
            const statusText = document.getElementById('ai-status-text');

            function checkAIPulse() {
                fetch('/api/ai-pulse/')
                    .then(response => response.json())
                    .then(data => {
                        if (data.online) {
                            statusDot.style.backgroundColor = '#28a745'; 
                            statusDot.style.animation = 'pulse-green 2s infinite';
                            statusText.innerText = 'AI ONLINE';
                            statusText.className = 'text-green-600 font-semibold tracking-wide uppercase';
                        } else {
                            statusDot.style.backgroundColor = '#dc3545';
                            statusDot.style.animation = 'none';
                            statusText.innerText = 'AI OFFLINE';
                            statusText.className = 'text-red-500 font-semibold tracking-wide uppercase';
                        }
                    })
                    .catch(error => {
                        statusDot.style.backgroundColor = '#dc3545';
                        statusDot.style.animation = 'none';
                        statusText.innerText = 'AI OFFLINE';
                        statusText.className = 'text-red-500 font-semibold tracking-wide uppercase';
                    });
            }

            checkAIPulse();
            setInterval(checkAIPulse, 15000); 
        });
    </script>
</body>
</html>
