{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cut-Once</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        // Check local storage or system preference to set the initial theme
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-zinc-900 text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-300">

    <nav class="flex justify-between items-center p-6">
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 focus:outline-none rounded-lg text-sm p-2.5">
                <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon text-xl"></i>
                <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun text-xl"></i>
            </button>
            
            <div class="text-xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">CUT-ONCE.</div>
        </div>
        
        <div class="flex items-center space-x-6">
            {% if user.is_authenticated %}
                {% if user.is_staff %}
                    <a href="/admin" class="text-gray-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition">
                        <i class="fa-solid fa-gears text-xl"></i>
                    </a>
                    <a href="/add" class="text-gray-500 hover:text-indigo-600 dark:hover:text-indigo-400 transition">
                        <i class="fa-solid fa-circle-plus text-xl"></i>
                    </a>
                {% endif %}
                <span class="text-sm text-gray-400">|</span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="text-sm font-medium hover:underline">Logout</button>
                </form>
            {% endif %}
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6">
        <div class="py-12 text-center">
            <h1 class="text-4xl font-bold mb-4">How can I help you today?</h1>
            <p class="text-gray-600 dark:text-gray-400 mb-8">Ask a question and I'll search our internal documents for an answer.</p>
            
            <div class="relative max-w-2xl mx-auto">
                <input type="text" 
                       placeholder="e.g. How do I setup the printer?" 
                       class="w-full pl-12 pr-4 py-4 rounded-2xl border border-gray-200 dark:border-zinc-700 bg-white dark:bg-zinc-800 focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-5 text-gray-400"></i>
            </div>
        </div>

        {% block content %}
        {% endblock %}
    </main>

    <script>
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        // Change the icons inside the button based on previous settings
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        var themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            // toggle icons inside button
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            // if set via local storage previously
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            // if NOT set via local storage previously
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
