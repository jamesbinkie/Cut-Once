{% extends "admin/base.html" %}

{% block title %}{{ title }} | Cut-Once Admin{% endblock %}

{% block extrastyle %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
    /* 1. Base Branding (Light Mode) */
    body, #content { font-family: 'Open Sans', sans-serif !important; }

    #header {
        background: #ffffff !important;
        color: #009FE3 !important;
        border-bottom: 1px solid #eee !important;
        padding: 15px 40px !important;
    }

    #branding h1 {
        font-family: 'Open Sans', sans-serif !important;
        font-weight: 800 !important;
        color: #009FE3 !important;
    }

    .button, input[type=submit] {
        background: #009FE3 !important;
        border-radius: 8px !important;
    }

    /* 2. Dark Mode Overrides */
    /* This triggers when the 'dark' class is present on the HTML tag */
    .dark #header {
        background: #18181b !important; /* Matches your zinc-900 bg */
        border-bottom: 1px solid #3f3f46 !important;
    }

    .dark #branding h1 a {
        color: #009FE3 !important;
    }

    .dark .module h2, .dark .module caption {
        background: #27272a !important;
        color: #009FE3 !important;
    }

    .dark div.breadcrumbs {
        background: #27272a !important;
        color: #a1a1aa !important;
        border-bottom: 1px solid #3f3f46 !important;
    }
</style>

<script>
    // This script ensures the Admin page knows if the site is in Dark Mode
    document.addEventListener('DOMContentLoaded', function() {
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    });
</script>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="color: #009FE3;">CUT-ONCE. ADMIN</a>
</h1>
{% endblock %}
