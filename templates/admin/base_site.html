{% extends "admin/base.html" %}

{% block title %}{{ title }} | Cut-Once Admin{% endblock %}

{% block extrastyle %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
    /* 1. Global Admin Branding */
    body, #content { font-family: 'Open Sans', sans-serif !important; }

    /* 2. Light Mode (Default) Force-fixes */
    #header {
        background: #ffffff !important;
        color: #009FE3 !important;
        border-bottom: 1px solid #eee !important;
    }
    #branding h1, #branding h1 a { color: #009FE3 !important; font-weight: 800 !important; }
    div.breadcrumbs { background: #f8f9fa !important; color: #666 !important; }
    .module h2, .module caption { background: #009FE3 !important; color: white !important; }

    /* 3. Dark Mode Overrides */
    .dark #header {
        background: #18181b !important;
        border-bottom: 1px solid #3f3f46 !important;
    }
    .dark #branding h1 a { color: #009FE3 !important; }
    .dark div.breadcrumbs {
        background: #27272a !important;
        color: #a1a1aa !important;
        border-bottom: 1px solid #3f3f46 !important;
    }
    .dark .module h2, .dark .module caption {
        background: #27272a !important;
        color: #009FE3 !important;
        border: 1px solid #3f3f46 !important;
    }

    /* Buttons always stay Brand Blue */
    .button, input[type=submit] {
        background: #009FE3 !important;
        border: none !important;
        font-weight: 600 !important;
    }
</style>

<script>
    // Strict 2-State Theme Sync
    function applyTheme() {
        const theme = localStorage.getItem('color-theme');
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
            // Ensure we aren't stuck in a 'system' middle ground
            localStorage.setItem('color-theme', 'light');
        }
    }
    
    // Run immediately and on storage change
    applyTheme();
    window.addEventListener('storage', applyTheme);
    document.addEventListener('DOMContentLoaded', applyTheme);
</script>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">CUT-ONCE. ADMIN</a>
</h1>
{% endblock %}
