{% extends "admin/base.html" %}

{% block title %}{{ title }} | Cut-Once Admin{% endblock %}

{% block extrastyle %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
    /* 1. Remove the 3-button 'Auto' theme switcher from the admin header */
    #theme-toggle { display: none !important; }

    /* 2. Global Typography */
    body, #content { font-family: 'Open Sans', sans-serif !important; }

    /* 3. LIGHT MODE FORCED DEFAULTS */
    /* We use :not(.dark) to ensure these ONLY apply when dark mode is OFF */
    html:not(.dark) body, 
    html:not(.dark) #header,
    html:not(.dark) .module h2, 
    html:not(.dark) .module caption {
        background-color: #ffffff !important;
        color: #009FE3 !important;
    }

    html:not(.dark) #header {
        border-bottom: 1px solid #eee !important;
    }

    html:not(.dark) div.breadcrumbs {
        background: #f8f9fa !important;
        color: #666 !important;
    }

    /* 4. DARK MODE FORCED OVERRIDES */
    html.dark #header {
        background: #18181b !important;
        border-bottom: 1px solid #3f3f46 !important;
    }

    html.dark .module h2, 
    html.dark .module caption,
    html.dark div.breadcrumbs {
        background: #27272a !important;
        color: #009FE3 !important;
        border: 1px solid #3f3f46 !important;
    }

    /* Branding & Buttons (Always Blue) */
    #branding h1, #branding h1 a { 
        color: #009FE3 !important; 
        font-weight: 800 !important; 
    }

    .button, input[type=submit] {
        background: #009FE3 !important;
        border: none !important;
    }
</style>

<script>
    // Force the Admin to follow our Front-end 2-state logic
    function syncAdminTheme() {
        const theme = localStorage.getItem('color-theme');
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'light');
        }
    }
    
    syncAdminTheme();
    // Listen for changes if you have two tabs open
    window.addEventListener('storage', syncAdminTheme);
    document.addEventListener('DOMContentLoaded', syncAdminTheme);
</script>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">CUT-ONCE. ADMIN</a>
</h1>
{% endblock %}
