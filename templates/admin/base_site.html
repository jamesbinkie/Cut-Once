{% extends "admin/base.html" %}

{% block title %}{{ title }} | Cut-Once Admin{% endblock %}

{% block extrastyle %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
    /* 1. HIDE THE THEME TOGGLER (The 3-option menu) */
    #header #theme-toggle, 
    .theme-toggle,
    #header .header-actions .theme-toggle { 
        display: none !important; 
    }

    /* 2. Global Fonts */
    body, #content { font-family: 'Open Sans', sans-serif !important; }

    /* 3. LIGHT MODE FORCED (When .dark is NOT present) */
    :root:not(.dark) #header {
        background: #ffffff !important;
        color: #009FE3 !important;
        border-bottom: 1px solid #eee !important;
    }
    :root:not(.dark) #branding h1, :root:not(.dark) #branding h1 a { 
        color: #009FE3 !important; 
    }
    :root:not(.dark) .module h2, :root:not(.dark) .module caption {
        background: #009FE3 !important;
        color: #ffffff !important;
    }
    :root:not(.dark) div.breadcrumbs {
        background: #f8f9fa !important;
        color: #666 !important;
    }

    /* 4. DARK MODE FORCED (When .dark IS present) */
    .dark #header {
        background: #18181b !important;
        border-bottom: 1px solid #3f3f46 !important;
    }
    .dark #branding h1 a { color: #009FE3 !important; }
    .dark .module h2, .dark .module caption, .dark div.breadcrumbs {
        background: #27272a !important;
        color: #009FE3 !important;
        border: 1px solid #3f3f46 !important;
    }

    /* Buttons always stay Brand Blue */
    .button, input[type=submit] {
        background: #009FE3 !important;
        border: none !important;
        font-weight: 600 !important;
    }
</style>

<script>
    // Force the Admin to strictly follow the 2-state logic
    function syncTheme() {
        const theme = localStorage.getItem('color-theme');
        if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'light');
        }
    }
    syncTheme();
    window.addEventListener('storage', syncTheme);
    document.addEventListener('DOMContentLoaded', syncTheme);
</script>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">CUT-ONCE. ADMIN</a>
</h1>
{% endblock %}
